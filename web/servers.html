<!DOCTYPE html>
<html>
<head>
    <title>Servers - SPIRE Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
<nav>
    <div style="font-weight: bold; font-size: 18px; margin-right: 20px;">SPIRE Web GUI</div>
    <a href="dashboard.html">Dashboard</a>
    <a href="servers.html">Servers</a>
    <a href="admin.html" id="nav-admin" style="display: none;">Admin</a>
    <div style="flex-grow: 1;"></div>
    <a href="#" onclick="logout()">Logout</a>
</nav>

    <div class="container">
        <div class="card">
            <h3>Add New Server</h3>
            <div class="form-group">
                <input type="text" id="name" placeholder="Given Name (e.g. Production Server)">
                <input type="text" id="address" placeholder="Address (e.g. 192.168.1.10)">
                <input type="text" id="port" placeholder="Port (e.g. 8081)">
                <button onclick="addServer()">Connect</button>
            </div>
            <p id="msg"></p>
        </div>
        <div class="card">
            <h3>Connected Servers</h3>
            <table id="servers-table">
                <thead><tr><th>ID</th><th>Address</th><th>Domain</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        checkAuth();
        
        async function loadServers() {
            const res = await apiFetch('/api/servers');
            const data = await res.json();
            const tbody = document.querySelector('#servers-table tbody');
            tbody.innerHTML = '';
            data.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td>${s.id}</td><td>${s.address}</td><td>${s.domain}</td>
                        <td style="color: green;">● ${s.status}</td>
                        <td>
                            <button class="success" onclick="window.location.href='agents.html?id=${s.id}'">Agents</button>
                            <button onclick="window.location.href='entries.html?id=${s.id}'">Entries</button>
                        </td>
                    </tr>`;
            });
        }
        
        async function addServer() {
            const address = document.getElementById('address').value;
            const port = document.getElementById('port').value;
            const name = document.getElementById('name').value;
            const res = await apiFetch('/api/servers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({address, port, name})
            });
            if (res.ok) {
                document.getElementById('msg').innerText = "Added successfully.";
                loadServers();
            } else {
                const d = await res.json();
                document.getElementById('msg').innerText = d.error || "Failed";
            }
        }

        loadServers();
    </script>
</body>
</html>
