<!DOCTYPE html>
<html>
<head>
    <title>Entries - SPIRE Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
<nav>
    <div style="font-weight: bold; font-size: 18px; margin-right: 20px;">SPIRE Web GUI</div>
    <a href="dashboard.html">Dashboard</a>
    <a href="servers.html">Servers</a>
    <a href="admin.html" id="nav-admin" style="display: none;">Admin</a>
    <div style="flex-grow: 1;"></div>
    <a href="#" onclick="logout()">Logout</a>
</nav>

    <div class="container">
        <button onclick="window.location.href='servers.html'" style="margin-bottom: 15px; background: #6b7280;">&larr; Back to Servers</button>
        <div class="card">
            <h3 id="title">Entries for Server</h3>
            <pre id="output">Loading...</pre>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        checkAuth();
        const id = new URLSearchParams(window.location.search).get('id');
        document.getElementById('title').innerText = `Entries for Server #${id}`;
        
        async function load() {
            const res = await apiFetch(`/api/servers/${id}/entries`);
            const data = await res.json();
            document.getElementById('output').innerText = JSON.stringify(data, null, 2);
        }
        load();
    </script>
</body>
</html>
