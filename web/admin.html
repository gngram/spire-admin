<!DOCTYPE html>
<html>
<head>
    <title>Admin - SPIRE Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
<nav>
    <div style="font-weight: bold; font-size: 18px; margin-right: 20px;">SPIRE Web GUI</div>
    <a href="dashboard.html">Dashboard</a>
    <a href="servers.html">Servers</a>
    <a href="admin.html" id="nav-admin" style="display: none;">Admin</a>
    <div style="flex-grow: 1;"></div>
    <a href="#" onclick="logout()">Logout</a>
</nav>

    <div class="container">
        <div class="card">
            <h3>Provision New User</h3>
            <div class="form-group">
                <input type="text" id="new-user" placeholder="Username">
                <input type="password" id="new-pass" placeholder="Password">
                <label style="display:flex; align-items:center;"><input type="checkbox" id="is-admin"> Is Admin</label>
            </div>
            <button class="success" onclick="createUser()">Create Account</button>
            <p id="msg"></p>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        checkAuth();
        if (!isAdmin()) window.location.href = 'dashboard.html';

        async function createUser() {
            const u = document.getElementById('new-user').value;
            const p = document.getElementById('new-pass').value;
            const adm = document.getElementById('is-admin').checked;
            
            const res = await apiFetch('/api/users', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p, is_admin: adm})
            });
            const data = await res.json();
            document.getElementById('msg').innerText = data.status || data.error;
        }
    </script>
</body>
</html>
