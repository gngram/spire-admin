server {
    bind_address = "127.0.0.1"
    bind_port = 8082
    socket_path = "./server2.sock"
    trust_domain = "domain2.test"
    data_dir = "./server2_data"
    log_level = "INFO"
    federation {
        bundle_endpoint {
            address = "127.0.0.1"
            port = 8444
        }
    }
}
plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "./server2_data/datastore.sqlite3"
        }
    }
    KeyManager "disk" {
        plugin_data {
            keys_path = "./server2_data/keys.json"
        }
    }
    NodeAttestor "join_token" {
        plugin_data {}
    }
}
