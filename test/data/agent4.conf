agent {
    data_dir = "./agent4_data"
    log_level = "INFO"
    server_address = "127.0.0.1"
    server_port = 8082
    socket_path = "./agent4.sock"
    trust_domain = "domain2.test"
}
plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }
    KeyManager "disk" {
        plugin_data {
            directory = "./agent4_data"
        }
    }
    WorkloadAttestor "unix" {
        plugin_data {}
    }
}
